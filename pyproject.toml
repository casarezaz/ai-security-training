[tool.bandit]
exclude_dirs = ["tests", "notebooks"]
skips = ["B101"]  # Allow assert in non-production code

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "S", "B", "UP"]
ignore = ["S101"]  # Allow assert

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
